<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت — ایران‌فارما</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252a38;
    --accent: #3b82f6;
    --accent-dim: #1e3a5f;
    --red: #ef4444; --red-dim: #3b1219;
    --green: #22c55e; --green-dim: #0d2e1a;
    --amber: #f59e0b; --amber-dim: #2e1f05;
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .logo-dot {
    width: 9px; height: 9px; flex-shrink: 0; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 7px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  h1 { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .refresh-btn {
    flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 13px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.15s; white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; min-width: 0; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-value.red { color: var(--red); } .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); } .stat-value.blue { color: var(--accent); }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: inherit;
    font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .filter-btn.red.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .filter-btn.green.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .search-input {
    flex: 1; min-width: 120px; max-width: 240px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ── Error ── */
  .error-banner {
    background: var(--red-dim); border: 1px solid #7f1d1d; border-radius: 8px;
    padding: 12px 16px; color: var(--red); font-size: 13px; margin-bottom: 14px; display: none; line-height: 1.5;
  }

  /* ── Table wrap ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #1e2335; border-bottom: 1px solid var(--border); }
  th { padding: 11px 14px; text-align: right; font-weight: 500; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
  tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1a1f2e; }
  td { padding: 11px 14px; vertical-align: middle; color: var(--text-dim); }
  td.msg { color: var(--text); font-weight: 500; max-width: 200px; }
  td.answer { max-width: 240px; color: var(--text-muted); font-size: 12px; line-height: 1.5; }

  .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }

  /* ── Clickable cells ── */
  .clickable {
    cursor: pointer;
    border-bottom: 1px dashed var(--border);
    transition: color 0.15s;
  }
  .clickable:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* expanded row */
  .expanded-row td {
    background: #0f1420;
    padding: 0;
  }
  .expanded-content {
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .expanded-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .expanded-section p { color: var(--text); font-size: 13px; line-height: 1.7; }

  /* ── Badge ── */
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge.fallback { background: var(--red-dim); color: var(--red); border: 1px solid #7f1d1d; }
  .badge.rag { background: var(--green-dim); color: var(--green); border: 1px solid #14532d; }
  .badge.exact { background: #0d2438; color: #38bdf8; border: 1px solid #0c4a6e; }
  .badge.example { background: #1a1040; color: #a78bfa; border: 1px solid #4c1d95; }
  .badge.hybrid_llm { background: var(--amber-dim); color: var(--amber); border: 1px solid #78350f; }
  .badge.other { background: var(--border); color: var(--text-muted); border: 1px solid var(--border); }

  /* ── Score ── */
  .score-wrap { display: flex; align-items: center; gap: 6px; }
  .score-bar-bg { width: 50px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; }
  .score-num { font-size: 11px; color: var(--text-muted); min-width: 28px; }
  .time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* ── Loading / Empty ── */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .empty { text-align: center; padding: 50px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-title { font-size: 14px; color: var(--text-dim); margin-bottom: 6px; }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted); flex-wrap: wrap; gap: 8px;
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── Mobile cards ── */
  .card-list { display: none; }
  .log-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-bottom: 10px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .log-card:hover { border-color: var(--accent); }
  .card-header { padding: 14px; }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-msg { font-weight: 500; color: var(--text); font-size: 14px; flex: 1; }
  .card-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
  .card-answer { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-answer.expanded-card-text { display: block; -webkit-line-clamp: unset; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-matched { font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-detail {
    border-top: 1px solid var(--border); padding: 12px 14px;
    background: #0f1420; display: none;
    font-size: 12px; color: var(--text-muted); line-height: 1.7;
  }
  .card-detail.open { display: block; }
  .card-detail h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; margin-top: 10px; }
  .card-detail h4:first-child { margin-top: 0; }
  .card-detail p { color: var(--text); }
  .expand-hint { font-size: 11px; color: var(--text-muted); text-align: center; padding: 6px; border-top: 1px solid var(--border); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    th.hide-md, td.hide-md { display: none; }
  }
  @media (max-width: 600px) {
    body { padding: 12px; }
    h1 { font-size: 14px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 22px; }
    .search-input { max-width: 100%; }
    .table-wrap table, .table-wrap thead { display: none; }
    .table-wrap { background: transparent; border: none; border-radius: 0; overflow: visible; }
    .card-list { display: block; }
    .pagination { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 4px; }
    #empty-state, #loading { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .expanded-content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>پنل مدیریت چت‌بات</h1>
      <div class="subtitle">ایران‌فارما — لاگ مکالمات</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadLogs()">↻ بروزرسانی</button>
</header>

<div class="stats">
  <div class="stat-card"><div class="stat-label">کل مکالمات</div><div class="stat-value blue" id="stat-total">—</div></div>
  <div class="stat-card"><div class="stat-label">Fallback</div><div class="stat-value red" id="stat-fallback">—</div></div>
  <div class="stat-card"><div class="stat-label">پاسخ موفق</div><div class="stat-value green" id="stat-success">—</div></div>
  <div class="stat-card"><div class="stat-label">نرخ پاسخ‌دهی</div><div class="stat-value amber" id="stat-rate">—</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">همه</button>
  <button class="filter-btn red" onclick="setFilter('fallback',this)">Fallback</button>
  <button class="filter-btn green" onclick="setFilter('rag',this)">RAG</button>
  <button class="filter-btn" onclick="setFilter('exact',this)">Exact</button>
  <button class="filter-btn" onclick="setFilter('example',this)">Example</button>
  <input class="search-input" type="text" placeholder="جستجو..." oninput="onSearch(this.value)">
</div>

<div class="error-banner" id="error-banner"></div>

<div class="table-wrap">
  <div class="loading" id="loading">در حال بارگذاری...</div>

  <table id="log-table" style="display:none">
    <thead>
      <tr>
        <th>زمان</th>
        <th>پیام کاربر</th>
        <th class="hide-md">پاسخ</th>
        <th>منبع</th>
        <th class="hide-md">امتیاز</th>
        <th class="hide-md">سوال مشابه CSV</th>
      </tr>
    </thead>
    <tbody id="log-body"></tbody>
  </table>

  <div class="card-list" id="card-list"></div>

  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">📭</div>
    <div class="empty-title">هیچ نتیجه‌ای یافت نشد</div>
    <div>فیلتر را تغییر دهید یا لاگ‌ها را بروزرسانی کنید</div>
  </div>

  <div class="pagination" id="pagination" style="display:none">
    <span id="page-info"></span>
    <div class="page-btns">
      <button class="page-btn" id="btn-prev" onclick="changePage(-1)">قبلی</button>
      <button class="page-btn" id="btn-next" onclick="changePage(1)">بعدی</button>
    </div>
  </div>
</div>

<script>
const API = 'https://chatbot.iphexpo.com';
const PAGE_SIZE = 25;
let allRows = [], filtered = [];
let currentFilter = 'all', currentSearch = '', currentPage = 0;

function isMobile() { return window.innerWidth <= 600; }

async function loadLogs() {
  ['log-table','card-list','empty-state','pagination'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-banner').style.display = 'none';
  try {
    const res = await fetch(`${API}/api/logs`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allRows = data.logs || [];
    updateStats();
    applyFilters();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const eb = document.getElementById('error-banner');
    eb.textContent = `خطا در بارگذاری: ${e.message}`;
    eb.style.display = 'block';
  }
}

function updateStats() {
  const total = allRows.length;
  const fallbacks = allRows.filter(r => r.source === 'fallback').length;
  const success = total - fallbacks;
  const rate = total > 0 ? Math.round((success/total)*100) : 0;
  document.getElementById('stat-total').textContent = total.toLocaleString('fa');
  document.getElementById('stat-fallback').textContent = fallbacks.toLocaleString('fa');
  document.getElementById('stat-success').textContent = success.toLocaleString('fa');
  document.getElementById('stat-rate').textContent = rate + '%';
}

function setFilter(f, btn) {
  currentFilter = f; currentPage = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function onSearch(val) { currentSearch = val.trim(); currentPage = 0; applyFilters(); }

function applyFilters() {
  filtered = allRows.filter(r => {
    const ms = currentFilter === 'all' || r.source === currentFilter;
    const ss = !currentSearch ||
      (r.user_message||'').includes(currentSearch) ||
      (r.bot_answer||'').includes(currentSearch) ||
      (r.matched_question||'').includes(currentSearch);
    return ms && ss;
  }).slice().reverse();
  renderPage();
}

function scoreBar(score) {
  const c = score >= 0.7 ? '#22c55e' : score >= 0.45 ? '#f59e0b' : '#ef4444';
  return `<div class="score-wrap">
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${Math.round(score*100)}%;background:${c}"></div></div>
    <span class="score-num">${score > 0 ? score.toFixed(2) : '—'}</span>
  </div>`;
}

function badgeHtml(src) {
  const cls = ['fallback','rag','exact','example','hybrid_llm'].includes(src) ? src : 'other';
  return `<span class="badge ${cls}">${src}</span>`;
}

function renderPage() {
  document.getElementById('loading').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('log-table').style.display = 'none';
    document.getElementById('card-list').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  const start = currentPage * PAGE_SIZE;
  const pageRows = filtered.slice(start, start + PAGE_SIZE);

  if (isMobile()) {
    // ── Mobile: cards ──
    document.getElementById('log-table').style.display = 'none';
    const cl = document.getElementById('card-list');
    cl.style.display = 'block';
    cl.innerHTML = '';

    pageRows.forEach((row, i) => {
      const score = parseFloat(row.score) || 0;
      const card = document.createElement('div');
      card.className = 'log-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-row">
            <span class="card-msg">${esc(row.user_message)}</span>
            <span class="card-time">${formatTime(row.timestamp)}</span>
          </div>
          <div class="card-answer" id="ca-${i}">${esc(row.bot_answer)}</div>
          <div class="card-meta">
            ${badgeHtml(row.source)}
            ${scoreBar(score)}
            <span class="card-matched">${esc(row.matched_question) || '—'}</span>
          </div>
        </div>
        <div class="expand-hint" id="hint-${i}">▼ برای مشاهده کامل کلیک کنید</div>
        <div class="card-detail" id="cd-${i}">
          <h4>پیام کامل کاربر</h4>
          <p>${esc(row.user_message)}</p>
          <h4>پاسخ کامل</h4>
          <p>${esc(row.bot_answer)}</p>
          <h4>سوال مشابه در CSV</h4>
          <p>${esc(row.matched_question) || '—'}</p>
        </div>`;

      card.addEventListener('click', () => {
        const detail = document.getElementById(`cd-${i}`);
        const hint = document.getElementById(`hint-${i}`);
        const ca = document.getElementById(`ca-${i}`);
        const isOpen = detail.classList.contains('open');
        detail.classList.toggle('open', !isOpen);
        ca.classList.toggle('expanded-card-text', !isOpen);
        hint.textContent = isOpen ? '▼ برای مشاهده کامل کلیک کنید' : '▲ بستن';
        card.style.borderColor = isOpen ? '' : 'var(--accent)';
      });

      cl.appendChild(card);
    });

  } else {
    // ── Desktop: table ──
    document.getElementById('card-list').style.display = 'none';
    const tbl = document.getElementById('log-table');
    tbl.style.display = 'table';
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';

    pageRows.forEach((row, i) => {
      const score = parseFloat(row.score) || 0;
      const uid = `row-${currentPage}-${i}`;

      // main row
      const tr = document.createElement('tr');
      tr.id = uid;
      tr.innerHTML = `
        <td><span class="time">${formatTime(row.timestamp)}</span></td>
        <td class="msg">
          <span class="truncate clickable" title="کلیک برای مشاهده کامل">${esc(row.user_message)}</span>
        </td>
        <td class="answer hide-md">
          <span class="truncate clickable" title="کلیک برای مشاهده کامل">${esc(row.bot_answer)}</span>
        </td>
        <td>${badgeHtml(row.source)}</td>
        <td class="hide-md">${scoreBar(score)}</td>
        <td class="hide-md">
          <span class="truncate clickable" style="max-width:160px;color:var(--text-muted);font-size:12px"
            title="کلیک برای مشاهده کامل">${esc(row.matched_question) || '—'}</span>
        </td>`;

      // expanded row (hidden by default)
      const exTr = document.createElement('tr');
      exTr.className = 'expanded-row';
      exTr.id = uid + '-ex';
      exTr.style.display = 'none';
      const colspan = 6;
      exTr.innerHTML = `<td colspan="${colspan}">
        <div class="expanded-content">
          <div class="expanded-section">
            <h4>پیام کامل کاربر</h4>
            <p>${esc(row.user_message)}</p>
            <h4 style="margin-top:12px">سوال مشابه در CSV</h4>
            <p>${esc(row.matched_question) || '—'}</p>
          </div>
          <div class="expanded-section">
            <h4>پاسخ کامل</h4>
            <p>${esc(row.bot_answer)}</p>
          </div>
        </div>
      </td>`;

      tr.addEventListener('click', () => {
        const isOpen = exTr.style.display !== 'none';
        exTr.style.display = isOpen ? 'none' : 'table-row';
        tr.style.background = isOpen ? '' : '#131828';
      });

      tbody.appendChild(tr);
      tbody.appendChild(exTr);
    });
  }

  // pagination
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages > 1) {
    pag.style.display = 'flex';
    document.getElementById('page-info').textContent = `صفحه ${currentPage+1} از ${totalPages} — ${filtered.length} ردیف`;
    document.getElementById('btn-prev').disabled = currentPage === 0;
    document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
  } else {
    pag.style.display = 'none';
  }
}

function changePage(dir) { currentPage += dir; renderPage(); }

function formatTime(ts) {
  if (!ts) return '—';
  return ts.replace('T',' ').substring(0,16);
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('resize', () => { if (filtered.length) renderPage(); });
loadLogs();
</script>
</body>
</html>
